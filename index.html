            <button className="bg-brand-green text-white font-bold py-2 px-4 rounded-xl shadow hover:bg-emerald-400 transition">{t[lang].view_plan}</button>
          </div>
        </div>
      </div>
    );

    const AdminLedger = ({ lang }) => (
      <div className="mt-4">
        <h2 className="text-3xl font-black text-brand-teal mb-8">{t[lang].nav_ledger}</h2>
        <div className="bg-white shadow-sm border border-gray-100 rounded-2xl overflow-hidden overflow-x-auto">
          <table className="w-full text-left whitespace-nowrap">
            <thead className="bg-gray-50 border-b border-gray-100 text-gray-500 text-sm">
              <tr><th className="p-4">{t[lang].tx_id}</th><th className="p-4">{t[lang].event_status}</th><th className="p-4">{t[lang].time}</th><th className="p-4">{t[lang].hash}</th></tr>
            </thead>
            <tbody className="divide-y divide-gray-50">
              {LEDGER_LOGS.map((log) => (
                <tr key={log.id} className="hover:bg-gray-50 transition-colors">
                  <td className="p-4 font-mono font-medium text-brand-teal">{log.id}</td>
                  <td className="p-4"><span className="bg-brand-light text-brand-green px-2 py-1 rounded text-xs font-bold border border-brand-green/20">{log.status[lang] || log.status.en}</span></td>
                  <td className="p-4 text-gray-600 text-sm">{log.time}</td>
                  <td className="p-4 font-mono text-xs text-gray-400">{log.hash}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );

    const DashboardCard = ({ title, value, icon, trend, status }) => (
      <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-start justify-between">
        <div><p className="text-gray-500 text-sm font-semibold mb-1">{title}</p><h4 className="text-3xl font-black text-brand-teal mb-2">{value}</h4><p className="text-xs font-bold text-gray-400">{trend}</p></div>
        <div className={`p-3 rounded-xl ${status === 'optimal' ? 'bg-brand-light border-brand-green/20' : 'bg-gray-100'} border`}>{icon}</div>
      </div>
    );

    const JourneyStep = ({ icon, title, desc, time, isLast }) => (
      <div className="relative flex items-start gap-4">
        <div className="absolute left-0 w-10 h-10 rounded-full bg-brand-light border-2 border-brand-green flex items-center justify-center text-brand-green z-10 shrink-0">{icon}</div>
        <div className="ml-14 bg-gray-50 p-4 rounded-xl border border-gray-100 flex-1">
          <div className="flex justify-between items-start mb-1"><h5 className="font-bold text-brand-teal">{title}</h5><span className="text-xs text-gray-400 font-mono tracking-tighter">{time}</span></div>
          <p className="text-sm text-gray-600">{desc}</p>
        </div>
      </div>
    );

    const rootElement = document.getElementById('root');
    if (rootElement) {
      const root = createRoot(rootElement);
      root.render(<App />);
    }
  </script>
</body>
</html>
